name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, feature/StreetCheck]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build client
        run: npm run build -w client

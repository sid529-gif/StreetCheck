stages:
  - setup
  - quality
  - build
  - pages

variables:
  NODE_VERSION: '20'
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# Avoid duplicate pipelines for branch pushes and merge requests
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

# Cache global npm cache across runs
cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

# ── Setup ────────────────────────────────────────────────────────────────────
install-deps:
  stage: setup
  image: node:${NODE_VERSION}-slim
  script:
    - npm ci --prefer-offline
    - npx prisma generate --schema=prisma/schema.prisma
  artifacts:
    paths:
      - node_modules/
      - client/node_modules/
      - server/node_modules/
      - shared/node_modules/
    expire_in: 1 day

# ── Quality Gate ─────────────────────────────────────────────────────────────
lint:
  stage: quality
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  script:
    - npm run lint
    - npm run format:check
    - npx biome ci .
    - npx oxlint

type-check:
  stage: quality
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  script:
    - npm run type-check

test-coverage:
  stage: quality
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  script:
    - npm run build --workspace shared
    - npm run coverage
  artifacts:
    paths:
      - server/coverage/
      - client/coverage/
    expire_in: 1 week

audit:
  stage: quality
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  script:
    - npm audit --workspaces --audit-level=high --omit=dev

knip:
  stage: quality
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  script:
    - npm run knip

secrets-scan:
  stage: quality
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --config .gitleaks.toml --verbose --redact

python-security:
  stage: quality
  image: python:3.11-slim
  script:
    - pip install bandit[toml] pip-audit
    - bandit -r ai-service/src ai-service/main.py -ll -ii
    - cd ai-service && pip-audit -r requirements.txt

# ── Build ────────────────────────────────────────────────────────────────────
build-client:
  stage: build
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  variables:
    VITE_BASE_URL: "/"
    VITE_API_BASE_URL: $VITE_API_BASE_URL
    VITE_CLOUDINARY_CLOUD_NAME: $VITE_CLOUDINARY_CLOUD_NAME
    VITE_CLOUDINARY_UPLOAD_PRESET: $VITE_CLOUDINARY_UPLOAD_PRESET
  script:
    - npm run build --workspace shared
    - npm run build --workspace client
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 hour

# ── GitLab Pages ─────────────────────────────────────────────────────────────
pages:
  stage: pages
  image: node:${NODE_VERSION}-slim
  dependencies:
    - install-deps
  variables:
    VITE_BASE_URL: "/"
    VITE_API_BASE_URL: $VITE_API_BASE_URL
    VITE_CLOUDINARY_CLOUD_NAME: $VITE_CLOUDINARY_CLOUD_NAME
    VITE_CLOUDINARY_UPLOAD_PRESET: $VITE_CLOUDINARY_UPLOAD_PRESET
  script:
    - npm run build --workspace shared
    - npm run build --workspace client
    - mkdir -p public
    - cp -r client/dist/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "feature/StreetCheck"
